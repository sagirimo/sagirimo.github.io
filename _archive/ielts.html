<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARASAKA DATABASE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --terminal-bg: #0d0d0d;
            --terminal-green: #00ff9d;
            --terminal-cyan: #00f0ff;
            --terminal-red: #ff3e3e;
            --terminal-yellow: #ffe600;
            --terminal-dim: #1a3a2a;
            --terminal-text: #c0ffc0;
            --scanline: rgba(0, 255, 157, 0.03);
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.8; }
            94% { opacity: 1; }
            97% { opacity: 0.9; }
            98% { opacity: 1; }
        }

        @keyframes scanline {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        @keyframes textShadow {
            0%, 100% { text-shadow: 0 0 4px var(--terminal-green); }
            50% { text-shadow: 0 0 8px var(--terminal-green), 0 0 16px var(--terminal-cyan); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes entrySlide {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--terminal-bg);
            color: var(--terminal-green);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            animation: flicker 4s infinite;
        }

        /* Scanlines */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                var(--scanline) 2px,
                var(--scanline) 4px
            );
            pointer-events: none;
            z-index: 1000;
        }

        /* Moving scanline */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(
                to bottom,
                transparent,
                rgba(0, 255, 157, 0.15),
                transparent
            );
            animation: scanline 8s linear infinite;
            pointer-events: none;
            z-index: 1001;
        }

        /* CRT corner effect */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse at center,
                transparent 0%,
                rgba(0, 0, 0, 0.3) 100%
            );
            pointer-events: none;
            z-index: 999;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            border-bottom: 1px solid var(--terminal-dim);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.75rem;
            color: var(--terminal-dim);
        }

        .header-line .status {
            color: var(--terminal-green);
        }

        .header-line .status::before {
            content: '● ';
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: var(--terminal-cyan);
            text-shadow: 0 0 10px var(--terminal-cyan);
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--terminal-dim);
            letter-spacing: 0.1em;
        }

        .subtitle .highlight {
            color: var(--terminal-yellow);
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 255, 157, 0.03);
            border: 1px solid var(--terminal-dim);
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
        }

        .stat-label {
            color: var(--terminal-dim);
        }

        .stat-value {
            color: var(--terminal-green);
            font-weight: 600;
        }

        /* Controls section */
        .controls-section {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        .filter-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            background: rgba(0, 255, 157, 0.05);
            border: 1px solid var(--terminal-dim);
            color: var(--terminal-green);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        .filter-input::placeholder {
            color: var(--terminal-dim);
        }

        .filter-input:focus {
            border-color: var(--terminal-green);
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.2);
        }

        /* View mode toggle */
        .view-toggle {
            display: flex;
            border: 1px solid var(--terminal-dim);
        }

        .view-btn {
            padding: 10px 15px;
            background: transparent;
            border: none;
            color: var(--terminal-dim);
            font-family: inherit;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .view-btn:hover {
            color: var(--terminal-green);
        }

        .view-btn.active {
            background: var(--terminal-green);
            color: var(--terminal-bg);
        }

        .view-btn:not(:last-child) {
            border-right: 1px solid var(--terminal-dim);
        }

        /* Vocabulary entries */
        .vocab-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 200px;
        }

        .vocab-entry {
            background: rgba(0, 255, 157, 0.02);
            border: 1px solid var(--terminal-dim);
            padding: 20px;
            position: relative;
            transition: all 0.2s;
            animation: entrySlide 0.3s ease-out;
        }

        .vocab-entry:hover {
            border-color: var(--terminal-green);
            background: rgba(0, 255, 157, 0.05);
        }

        .vocab-entry::before {
            content: '>';
            position: absolute;
            left: 8px;
            top: 20px;
            color: var(--terminal-dim);
        }

        .entry-index {
            position: absolute;
            right: 15px;
            top: 15px;
            font-size: 0.65rem;
            color: var(--terminal-dim);
        }

        .entry-header {
            display: flex;
            align-items: baseline;
            gap: 15px;
            margin-bottom: 8px;
            padding-left: 15px;
        }

        .word {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--terminal-cyan);
            animation: textShadow 3s ease-in-out infinite;
        }

        .pronunciation {
            display: inline-block;
            padding: 2px 8px;
            font-size: 0.85rem;
            color: var(--terminal-green);
            background: rgba(0, 255, 157, 0.08);
            border: 1px solid var(--terminal-dim);
            opacity: 0.9;
        }

        .entry-meaning {
            padding-left: 15px;
            margin-bottom: 12px;
            font-size: 0.95rem;
            color: var(--terminal-text);
        }

        .entry-context {
            padding: 12px 15px;
            margin-left: 15px;
            background: rgba(255, 230, 0, 0.03);
            border-left: 2px solid var(--terminal-yellow);
            font-size: 0.85rem;
            color: var(--terminal-yellow);
            font-style: italic;
        }

        .entry-context::before {
            content: 'CONTEXT: ';
            font-style: normal;
            font-weight: 600;
            margin-right: 5px;
        }

        /* Tag labels */
        .entry-tags {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            padding-left: 15px;
        }

        .tag {
            font-size: 0.65rem;
            padding: 3px 8px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--terminal-cyan);
            color: var(--terminal-cyan);
            letter-spacing: 0.05em;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
            padding: 20px;
            border: 1px solid var(--terminal-dim);
            background: rgba(0, 255, 157, 0.02);
        }

        .pagination-info {
            font-size: 0.75rem;
            color: var(--terminal-dim);
            margin-right: 20px;
        }

        .pagination-info span {
            color: var(--terminal-green);
            font-weight: 600;
        }

        .page-btn {
            padding: 8px 12px;
            background: transparent;
            border: 1px solid var(--terminal-dim);
            color: var(--terminal-green);
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-btn:hover:not(:disabled) {
            background: var(--terminal-green);
            color: var(--terminal-bg);
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .page-numbers {
            display: flex;
            gap: 5px;
        }

        .page-num {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid var(--terminal-dim);
            color: var(--terminal-dim);
            font-family: inherit;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-num:hover {
            border-color: var(--terminal-green);
            color: var(--terminal-green);
        }

        .page-num.active {
            background: var(--terminal-green);
            border-color: var(--terminal-green);
            color: var(--terminal-bg);
        }

        .page-ellipsis {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--terminal-dim);
            font-size: 0.75rem;
        }

        /* Footer */
        .terminal-footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--terminal-dim);
            text-align: center;
        }

        .footer-text {
            font-size: 0.7rem;
            color: var(--terminal-dim);
            letter-spacing: 0.1em;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            border: 1px solid var(--terminal-dim);
            color: var(--terminal-green);
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .back-link:hover {
            background: var(--terminal-green);
            color: var(--terminal-bg);
        }

        /* Hidden state */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 20px 15px;
            }

            .title {
                font-size: 1.1rem;
                letter-spacing: 0.2em;
            }

            .controls-section {
                flex-direction: column;
            }

            .filter-input {
                width: 100%;
            }

            .view-toggle {
                width: 100%;
            }

            .view-btn {
                flex: 1;
            }

            .entry-header {
                flex-direction: column;
                gap: 5px;
            }

            .pagination {
                flex-wrap: wrap;
            }

            .page-numbers {
                order: 1;
                width: 100%;
                justify-content: center;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>

    <div class="container">
        <header class="header">
            <div class="header-line">
                <span class="status">CONNECTED</span>
                <span>SESSION: IELTS-VOCAB-001</span>
            </div>
            <h1 class="title">ARASAKA DATABASE</h1>
            <p class="subtitle">MEDICAL & TECH <span class="highlight">VOCABULARY</span> ARCHIVE</p>
        </header>

        <div class="stats-bar">
            <div class="stat">
                <span class="stat-label">TOTAL:</span>
                <span class="stat-value" id="total-count">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">SHOWN:</span>
                <span class="stat-value" id="shown-count">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">FILTERED:</span>
                <span class="stat-value" id="filtered-count">0</span>
            </div>
        </div>

        <div class="controls-section">
            <input
                type="text"
                class="filter-input"
                id="search-input"
                placeholder=">> SEARCH DATABASE... (word, meaning, or context)"
                autocomplete="off"
            >
            <div class="view-toggle">
                <button class="view-btn active" data-view="paged">10/PAGE</button>
                <button class="view-btn" data-view="all">SHOW ALL</button>
            </div>
        </div>

        <div class="vocab-list" id="vocab-list">
            <!-- Entries loaded via JS -->
        </div>

        <div class="pagination" id="pagination">
            <div class="pagination-info">
                PAGE <span id="current-page">1</span> / <span id="total-pages">1</span>
            </div>
            <button class="page-btn" id="prev-btn">← PREV</button>
            <div class="page-numbers" id="page-numbers">
                <!-- Page numbers inserted via JS -->
            </div>
            <button class="page-btn" id="next-btn">NEXT →</button>
        </div>

        <footer class="terminal-footer">
            <p class="footer-text">// CLASSIFIED: IELTS PREPARATION MODULE //</p>
            <a href="index.html" class="back-link">[ RETURN TO MAINFRAME ]</a>
        </footer>
    </div>

    <script>
        // ========================================
        // Embedded Vocabulary Data (for local file support)
        // ========================================
        const EMBEDDED_VOCAB = [
            {
                "word": "Mitigate",
                "pronunciation": "/ˈmɪt̬.ə.ɡeɪt/",
                "meaning": "缓解 / 减轻",
                "context": "Use a 3D guide to mitigate the risk of drilling errors."
            },
            {
                "word": "Vulnerable",
                "pronunciation": "/ˈvʌl.nɚ.ə.bəl/",
                "meaning": "极易受伤害的 / 有漏洞的",
                "context": "A patient with osteoporosis is vulnerable to fractures."
            },
            {
                "word": "Flaw",
                "pronunciation": "/flɑː/",
                "meaning": "设计缺陷",
                "context": "A design flaw in the surgical guide mechanics."
            },
            {
                "word": "Replicate",
                "pronunciation": "/ˈrep.lɪ.keɪt/",
                "meaning": "复现 (实验结果)",
                "context": "We need to replicate the clinical results in rural hospitals."
            },
            {
                "word": "Empirical",
                "pronunciation": "/ɪmˈpɪr.ɪ.kəl/",
                "meaning": "基于实证的 / 真实数据的",
                "context": "An empirical study on robotic surgery learning curves."
            },
            {
                "word": "Resilient",
                "pronunciation": "/rɪˈzɪl.jənt/",
                "meaning": "恢复力强的 / 有弹性的",
                "context": "Silicone is a highly resilient material for prototyping."
            }
        ];

        // ========================================
        // State Management
        // ========================================
        let vocabulary = [];
        let filteredVocab = [];
        let currentPage = 1;
        let itemsPerPage = 10;
        let viewMode = 'paged'; // 'paged' or 'all'

        // ========================================
        // DOM Elements
        // ========================================
        const vocabList = document.getElementById('vocab-list');
        const searchInput = document.getElementById('search-input');
        const totalCount = document.getElementById('total-count');
        const shownCount = document.getElementById('shown-count');
        const filteredCount = document.getElementById('filtered-count');
        const currentPageEl = document.getElementById('current-page');
        const totalPagesEl = document.getElementById('total-pages');
        const paginationEl = document.getElementById('pagination');
        const pageNumbersEl = document.getElementById('page-numbers');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const viewBtns = document.querySelectorAll('.view-btn');

        // ========================================
        // Data Loading
        // ========================================
        async function loadVocabulary() {
            try {
                // Try fetching from JSON file (works on GitHub Pages)
                const response = await fetch('vocabulary.json');
                if (response.ok) {
                    vocabulary = await response.json();
                } else {
                    throw new Error('JSON not found');
                }
            } catch (error) {
                // Fallback to embedded data (works locally via file://)
                vocabulary = EMBEDDED_VOCAB;
            }

            totalCount.textContent = vocabulary.length;
            filteredVocab = [...vocabulary];
            render();
        }

        // ========================================
        // Rendering
        // ========================================
        function render() {
            renderVocabList();
            renderPagination();
            updateStats();
        }

        function renderVocabList() {
            if (filteredVocab.length === 0) {
                vocabList.innerHTML = `
                    <div class="vocab-entry">
                        <div class="entry-meaning" style="color: var(--terminal-yellow);">
                            NO MATCHES FOUND IN DATABASE
                        </div>
                    </div>
                `;
                return;
            }

            let itemsToRender;
            let startIndex;

            if (viewMode === 'all') {
                itemsToRender = filteredVocab;
                startIndex = 0;
            } else {
                startIndex = (currentPage - 1) * itemsPerPage;
                itemsToRender = filteredVocab.slice(startIndex, startIndex + itemsPerPage);
            }

            // Use document fragment for better performance
            const fragment = document.createDocumentFragment();

            itemsToRender.forEach((item, index) => {
                const entry = document.createElement('div');
                entry.className = 'vocab-entry';
                entry.style.animationDelay = `${index * 0.03}s`;

                const globalIndex = startIndex + index + 1;

                entry.innerHTML = `
                    <span class="entry-index">#${globalIndex}</span>
                    <div class="entry-header">
                        <span class="word">${escapeHtml(item.word)}</span>
                        <span class="pronunciation">${escapeHtml(item.pronunciation)}</span>
                    </div>
                    <div class="entry-meaning">${escapeHtml(item.meaning)}</div>
                    <div class="entry-context">${escapeHtml(item.context)}</div>
                    <div class="entry-tags">
                        <span class="tag">IELTS</span>
                        <span class="tag">MED/TECH</span>
                    </div>
                `;

                fragment.appendChild(entry);
            });

            vocabList.innerHTML = '';
            vocabList.appendChild(fragment);
        }

        function renderPagination() {
            if (viewMode === 'all' || filteredVocab.length === 0) {
                paginationEl.classList.add('hidden');
                return;
            }

            paginationEl.classList.remove('hidden');

            const totalPages = Math.ceil(filteredVocab.length / itemsPerPage);
            totalPagesEl.textContent = totalPages;
            currentPageEl.textContent = currentPage;

            // Update prev/next buttons
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;

            // Render page numbers
            pageNumbersEl.innerHTML = '';

            const maxVisible = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);

            // Adjust if we're near the end
            if (endPage - startPage + 1 < maxVisible) {
                startPage = Math.max(1, endPage - maxVisible + 1);
            }

            // First page
            if (startPage > 1) {
                pageNumbersEl.appendChild(createPageButton(1));
                if (startPage > 2) {
                    pageNumbersEl.appendChild(createEllipsis());
                }
            }

            // Visible pages
            for (let i = startPage; i <= endPage; i++) {
                pageNumbersEl.appendChild(createPageButton(i));
            }

            // Last page
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    pageNumbersEl.appendChild(createEllipsis());
                }
                pageNumbersEl.appendChild(createPageButton(totalPages));
            }
        }

        function createPageButton(page) {
            const btn = document.createElement('button');
            btn.className = `page-num ${page === currentPage ? 'active' : ''}`;
            btn.textContent = page;
            btn.addEventListener('click', () => goToPage(page));
            return btn;
        }

        function createEllipsis() {
            const ellipsis = document.createElement('span');
            ellipsis.className = 'page-ellipsis';
            ellipsis.textContent = '...';
            return ellipsis;
        }

        function updateStats() {
            const showing = viewMode === 'all' ? filteredVocab.length :
                Math.min(itemsPerPage, filteredVocab.length - (currentPage - 1) * itemsPerPage);

            shownCount.textContent = showing;
            filteredCount.textContent = filteredVocab.length;
        }

        // ========================================
        // Navigation
        // ========================================
        function goToPage(page) {
            const totalPages = Math.ceil(filteredVocab.length / itemsPerPage);
            if (page < 1 || page > totalPages) return;

            currentPage = page;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        prevBtn.addEventListener('click', () => goToPage(currentPage - 1));
        nextBtn.addEventListener('click', () => goToPage(currentPage + 1));

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (document.activeElement === searchInput) return;

            if (e.key === 'ArrowLeft') {
                goToPage(currentPage - 1);
            } else if (e.key === 'ArrowRight') {
                goToPage(currentPage + 1);
            }
        });

        // ========================================
        // View Mode Toggle
        // ========================================
        viewBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                viewMode = btn.dataset.view;

                viewBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                render();
            });
        });

        // ========================================
        // Search/Filter
        // ========================================
        let searchTimeout = null;

        searchInput.addEventListener('input', (e) => {
            // Debounce for performance
            if (searchTimeout) clearTimeout(searchTimeout);

            searchTimeout = setTimeout(() => {
                const query = e.target.value.toLowerCase().trim();

                if (!query) {
                    filteredVocab = [...vocabulary];
                } else {
                    filteredVocab = vocabulary.filter(item =>
                        item.word.toLowerCase().includes(query) ||
                        item.meaning.toLowerCase().includes(query) ||
                        item.context.toLowerCase().includes(query)
                    );
                }

                // Reset to first page when searching
                currentPage = 1;
                render();
            }, 150);
        });

        // ========================================
        // Utilities
        // ========================================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========================================
        // Initialize
        // ========================================
        loadVocabulary();

        // Easter egg: "hack" triggers glitch effect
        let hackBuffer = '';
        document.addEventListener('keydown', (e) => {
            if (document.activeElement === searchInput) return;

            hackBuffer += e.key.toLowerCase();
            if (hackBuffer.length > 10) {
                hackBuffer = hackBuffer.slice(-10);
            }
            if (hackBuffer.includes('hack')) {
                document.body.style.animation = 'glitch 0.3s ease';
                setTimeout(() => {
                    document.body.style.animation = 'flicker 4s infinite';
                }, 300);
                hackBuffer = '';
            }
        });
    </script>
</body>
</html>
