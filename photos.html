    <style>
        .photo-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 20px;
            padding: 20px 0;
        }

        .photo-item {
            width: calc(12.5% - 6px); /* 8 per row */
            aspect-ratio: 4/3;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.05);
            transform-origin: center center;
            transition: transform 0.15s ease-out, z-index 0s;
            will-change: transform;
        }

        [data-theme="dark"] .photo-item {
            background: rgba(255, 255, 255, 0.05);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .photo-item img.loaded {
            opacity: 1;
        }

        .photo-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.4) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .photo-item:hover::after {
            opacity: 1;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2.5rem;
            color: #fff;
            cursor: pointer;
            z-index: 1001;
            transition: color 0.2s;
        }

        .lightbox-close:hover {
            color: var(--accent);
        }

        #lightbox-img {
            max-width: 90%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 4px;
        }

        .lightbox-caption {
            color: #fff;
            text-align: center;
            padding: 15px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            font-family: var(--font-mono);
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .photo-item { width: calc(16.666% - 6px); } /* 6 per row */
        }
        @media (max-width: 900px) {
            .photo-item { width: calc(20% - 6px); } /* 5 per row */
        }
        @media (max-width: 600px) {
            .photo-item { width: calc(25% - 6px); } /* 4 per row */
            .photo-grid { gap: 4px; }
        }
    </style>

        // 渲染照片网格
        const grid = document.querySelector('.photo-grid');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCaption = document.getElementById('lightbox-caption');

        const photoItems = [];

        photos.forEach((photo, index) => {
            const item = document.createElement('div');
            item.className = 'photo-item';
            item.innerHTML = `<img src="photos/thumbs/${photo.file}" alt="${photo.caption || 'Photo ' + (index + 1)}" loading="lazy">`;

            const img = item.querySelector('img');
            img.onload = () => img.classList.add('loaded');

            item.addEventListener('click', () => {
                lightboxImg.src = `photos/full/${photo.file}`;
                lightboxCaption.textContent = photo.caption || '';
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
            });

            grid.appendChild(item);
            photoItems.push(item);
        });

        // Mac Dock 风格放大效果
        const dockConfig = {
            maxScale: 1.5,      // 最大放大倍数
            radius: 120,        // 影响半径（像素）
            easing: 0.15        // 动画缓动系数
        };

        let photoMouseX = -1000;
        let photoMouseY = -1000;

        // 监听鼠标移动
        grid.addEventListener('mousemove', (e) => {
            photoMouseX = e.clientX;
            photoMouseY = e.clientY;
        });

        grid.addEventListener('mouseleave', () => {
            photoMouseX = -1000;
            photoMouseY = -1000;
        });

        // 动画循环：更新每个照片的缩放
        function updateDockEffect() {
            photoItems.forEach(item => {
                const rect = item.getBoundingClientRect();
                const itemCenterX = rect.left + rect.width / 2;
                const itemCenterY = rect.top + rect.height / 2;

                // 计算鼠标到照片中心的距离
                const dx = photoMouseX - itemCenterX;
                const dy = photoMouseY - itemCenterY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // 根据距离计算缩放比例
                let scale = 1;
                if (distance < dockConfig.radius) {
                    const ratio = 1 - (distance / dockConfig.radius);
                    scale = 1 + (dockConfig.maxScale - 1) * ratio * ratio; // 二次缓动
                }

                item.style.transform = `scale(${scale})`;
                item.style.zIndex = scale > 1 ? '10' : '1';
            });

            requestAnimationFrame(updateDockEffect);
        }

        updateDockEffect();

        // 关闭 lightbox
        document.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }
